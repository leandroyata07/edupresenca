<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="102" fill="url(#bg)"/>
  <!-- Graduation cap body -->
  <polygon points="256,120 400,185 256,250 112,185" fill="white" opacity="0.95"/>
  <!-- Cap top -->
  <rect x="226" y="112" width="60" height="16" rx="8" fill="white"/>
  <!-- Diploma scroll / books -->
  <rect x="168" y="270" width="176" height="110" rx="16" fill="white" opacity="0.15"/>
  <rect x="184" y="286" width="144" height="78" rx="10" fill="white" opacity="0.9"/>
  <!-- Checkmark -->
  <polyline points="210,328 246,364 302,295" fill="none" stroke="#4f46e5" stroke-width="22" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Tassel -->
  <line x1="400" y1="185" x2="400" y2="240" stroke="white" stroke-width="8" opacity="0.8" stroke-linecap="round"/>
  <circle cx="400" cy="252" r="16" fill="white" opacity="0.8"/>
</svg>
