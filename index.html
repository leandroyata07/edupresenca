<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <script>document.write('<base href="'+(location.hostname==='localhost'||location.hostname==='127.0.0.1'?'/':'/edupresenca/')+'"/>')</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="EduPresença v2 – Sistema de gerenciamento de notas, presença e turmas para escolas." />
  <meta name="theme-color" content="#4f46e5" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="EduPresença v2" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />

  <!-- Open Graph -->
  <meta property="og:title" content="EduPresença v2" />
  <meta property="og:description" content="Gerenciamento escolar: notas, presença, turmas, cursos e muito mais." />
  <meta property="og:type" content="website" />

  <title>EduPresença v2 – Gestão Escolar</title>

  <!-- CSS (shared with root) -->
  <link rel="stylesheet" href="css/variables.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/animations.css" />

  <!-- v2-specific styles -->
  <style>
    /* Filter bar */
    .filter-bar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      padding: 14px 0 10px;
    }

    .filter-bar .form-control {
      min-width: 160px;
      height: 38px;
      font-size: 13px;
    }

    .filter-bar .filter-search {
      min-width: 220px;
      position: relative;
    }

    .filter-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
      background: rgba(99, 102, 241, 0.18);
      color: #818cf8;
      border: 1px solid rgba(99, 102, 241, 0.3);
    }

    .filter-chip button {
      background: none;
      border: none;
      color: inherit;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      opacity: 0.7;
      font-size: 14px;
    }

    .filter-chip button:hover {
      opacity: 1;
    }

    /* Empty state enhanced */
    .empty-state-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
      text-align: center;
      gap: 16px;
      background: var(--bg-surface);
      border-radius: var(--radius-lg, 16px);
      border: 1.5px dashed var(--border-color, rgba(255, 255, 255, 0.1));
      margin-top: 8px;
    }

    .empty-state-page .esp-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: rgba(99, 102, 241, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #818cf8;
    }

    .empty-state-page h3 {
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
    }

    .empty-state-page p {
      font-size: 13px;
      color: var(--text-secondary);
      max-width: 360px;
      margin: 0;
      line-height: 1.6;
    }

    /* Getting started card */
    .getting-started {
      border-radius: var(--radius-lg, 16px);
      background: linear-gradient(135deg, rgba(79, 70, 229, 0.15) 0%, rgba(124, 58, 237, 0.1) 100%);
      border: 1px solid rgba(99, 102, 241, 0.25);
      padding: 20px 24px;
      margin-bottom: 24px;
    }

    .getting-started-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .getting-started-header h3 {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0;
    }

    .getting-started-header span {
      font-size: 11px;
      color: var(--text-secondary);
    }

    .getting-started-steps {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .gs-step {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
    }

    .gs-step:hover {
      background: rgba(99, 102, 241, 0.15);
      border-color: rgba(99, 102, 241, 0.3);
      color: #818cf8;
    }

    .gs-step.done {
      color: var(--secondary-400, #34d399);
      border-color: rgba(52, 211, 153, 0.25);
      background: rgba(52, 211, 153, 0.06);
    }

    .gs-step.done::before {
      content: '✓';
      font-weight: 700;
    }

    .gs-step-num {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: rgba(99, 102, 241, 0.25);
      color: #818cf8;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .gs-step.done .gs-step-num {
      display: none;
    }

    /* v2 badge in sidebar */
    .v2-badge {
      display: inline-block;
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      background: rgba(245, 158, 11, 0.2);
      color: #fbbf24;
      border: 1px solid rgba(245, 158, 11, 0.3);
      vertical-align: middle;
      margin-left: 4px;
    }
  </style>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
</head>

<body>
  <!-- Skip to content for accessibility -->
  <a href="#main-content" class="skip-link">Pular para o conteúdo</a>

  <!-- App Shell -->
  <div id="app-shell" class="app-shell">
    <!-- Sidebar Web Component -->
    <app-sidebar role="navigation" aria-label="Menu principal"></app-sidebar>

    <!-- Main Area -->
    <div class="app-main">
      <!-- Header Web Component -->
      <app-header role="banner"></app-header>

      <!-- Page Content -->
      <main id="main-content" class="app-content" aria-live="polite" aria-atomic="false">
        <!-- Router renders page content here -->
        <div id="page-outlet" class="page-outlet">
          <!-- Loading skeleton -->
          <div class="page-loading" id="page-loading">
            <div class="skeleton skeleton-title"></div>
            <div class="skeleton skeleton-subtitle"></div>
            <div class="skeleton-grid">
              <div class="skeleton skeleton-card"></div>
              <div class="skeleton skeleton-card"></div>
              <div class="skeleton skeleton-card"></div>
              <div class="skeleton skeleton-card"></div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Mobile Overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay" aria-hidden="true"></div>
  </div>

  <!-- Toast Container (Web Component) -->
  <app-toast></app-toast>

  <!-- PWA Install Banner -->
  <div id="pwa-banner" class="pwa-banner" hidden>
    <div class="pwa-banner-content">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        aria-hidden="true">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />
      </svg>
      <span>Instale o <strong>EduPresença</strong> no seu dispositivo!</span>
    </div>
    <div class="pwa-banner-actions">
      <button id="pwa-install-btn" class="btn btn-primary btn-sm">Instalar</button>
      <button id="pwa-dismiss-btn" class="btn btn-ghost btn-sm">Depois</button>
    </div>
  </div>

  <!-- JavaScript Modules -->
  <script type="module" src="js/app.js"></script>
</body>

</html>
